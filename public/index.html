<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CFF URL Shortener</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="dark-mode-toggle" aria-label="Toggle dark mode">
        <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </button>
    <div class="container wide" id="main-container">
        <div id="password-screen" class="screen active">
            <h1>CFF URL Shortener</h1>
            <div class="form-group">
                <input type="password" id="password-input" placeholder="Enter password">
            </div>
            <button id="password-submit">Submit</button>
            <p id="password-error" class="error-message"></p>
        </div>

        <div id="shortener-screen" class="screen">
            <div class="tabs">
                <button class="tab-btn active" data-tab="create">Create Link</button>
                <button class="tab-btn" data-tab="history">History</button>
                <button id="logout-button" class="logout-btn">Logout</button>
            </div>
            
            <div id="create-tab" class="tab-content active">
                <h1>CFF URL Shortener</h1>
                <div class="form-group">
                    <input type="url" id="url-input" placeholder="Enter URL to shorten" required>
                </div>
                <div class="form-group">
                    <input type="text" id="slug-input" placeholder="Custom slug (optional)">
                </div>
                <button id="shorten-button">Shorten URL</button>
                
                <div id="result-container" class="hidden">
                    <h2>Your shortened URL:</h2>
                    <div class="result-box">
                        <p id="shortened-url"></p>
                        <button id="copy-button">Copy</button>
                    </div>
                    <div id="qr-container" class="qr-container hidden">
                        <img id="qr-code" src="" alt="QR Code">
                        <p class="qr-label">Scan to visit</p>
                    </div>
                    <button id="fullscreen-button" class="fullscreen-btn">View Full Screen</button>
                </div>
            </div>
            
            <div id="history-tab" class="tab-content">
                <h1>Link History</h1>
                <div class="search-bar">
                    <input type="text" id="search-input" placeholder="Search links...">
                    <button id="search-button">Search</button>
                </div>
                <div id="links-list" class="links-list">
                    <div class="loading">Loading links...</div>
                </div>
                <div id="pagination" class="pagination hidden">
                    <button id="prev-page" class="pagination-btn">&larr; Previous</button>
                    <span id="page-info" class="page-info">Page 1 of 1</span>
                    <button id="next-page" class="pagination-btn">Next &rarr;</button>
                </div>
            </div>
            
            <p id="error-message" class="error-message"></p>
        </div>
    </div>
    
    <!-- Full Screen QR Display Modal -->
    <div id="fullscreen-qr-modal" class="fullscreen-modal">
        <button id="close-fullscreen" class="close-fullscreen-btn">&times;</button>
        <div class="fullscreen-content" id="download-content">
            <div class="fullscreen-url-container">
                <span class="url-label">Link:</span>
                <span id="fullscreen-url" class="fullscreen-url"></span>
            </div>
            <div class="fullscreen-qr-container">
                <img id="fullscreen-qr" src="" alt="QR Code">
            </div>
            <p class="fullscreen-instruction">Scan QR code or visit the URL above</p>
            <div class="fullscreen-actions primary-actions">
                <button id="fullscreen-copy" class="btn-secondary">Copy URL</button>
                <a id="fullscreen-visit" href="#" target="_blank" class="btn-visit">
                    Visit Link <span class="arrow">→</span>
                </a>
            </div>
            <div class="fullscreen-actions download-actions">
                <button id="download-image" class="btn-download">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    Download as Image
                </button>
                <button id="download-pptx" class="btn-download btn-pptx">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    Download as PPTX
                </button>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
